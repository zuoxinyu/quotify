[secrets]
# Secret values are not persisted in this TOML file. Enter API keys, cookies,
# session keys, and service tokens from the settings UI or with the cookie helper;
# Quotify stores them in Windows Credential Manager as quotify/<provider>/<field>.
# Environment variables listed below are still supported for automation.

[general]
refresh_interval = 300
active_provider = ""                # Optional primary provider for tray icon/tip, e.g. "codex", "opencode", "claude"
start_with_windows = false          # Register Quotify under HKCU\Software\Microsoft\Windows\CurrentVersion\Run
backdrop = "mica_alt"               # "mica", "mica_alt", "acrylic", or "none"
provider_order = [
  "claude",
  "codex",
  "gemini",
  "antigravity",
  "opencode",
  "opencodego",
  "deepseek",
  "mimo",
  "openai",
  "openrouter",
  "moonshot",
  "elevenlabs",
  "doubao",
  "zai",
  "venice",
  "crof",
  "synthetic",
  "warp",
  "groqcloud",
  "deepgram",
  "llmproxy",
  "codebuff",
  "kiro",
  "copilot",
  "azureopenai",
  "ollama",
  "minimax",
  "jetbrains",
  "kimi",
  "kilo",
  "augment",
  "bedrock",
  "vertexai",
  "stepfun",
  "abacus",
  "alibabatoken",
  "t3chat",
  "amp",
  "mistral",
  "grok",
  "cursor",
  "droid",
  "windsurf",
]

[network]
proxy = ""                          # Optional explicit proxy: http://127.0.0.1:7890 or socks5://127.0.0.1:7890

[claude]
enabled = true
# auth_file = ""                    # Path to .credentials.json, auto-detected by default
# session_key = ""                  # Optional claude.ai sessionKey or full Cookie header; env: CLAUDE_SESSION_KEY

[codex]
enabled = true
# auth_file = ""                    # Path to codex auth.json, auto-detected by default

[gemini]
enabled = true
api_key = ""                        # Gemini API Key, or leave empty to auto-detect from env GEMINI_API_KEY / GOOGLE_API_KEY

[antigravity]
enabled = true
api_key = ""                        # Reserved; usage requires Antigravity OAuth credentials, not API-key mode
# OAuth credentials: env ANTIGRAVITY_OAUTH_CREDENTIALS_JSON or ~/.codexbar/antigravity/oauth_creds.json

[opencode]
enabled = true
api_key = ""                        # Reserved; OpenCode/OpenCode Go usage is read from an explicit opencode.ai auth cookie
workspace_id = ""                   # Optional wrk_... ID or opencode.ai workspace URL; env: OPENCODE_WORKSPACE_ID / CODEXBAR_OPENCODEGO_WORKSPACE_ID
auth_cookie = ""                    # Optional auth cookie value or full Cookie header; env: OPENCODE_AUTH_COOKIE

[deepseek]
enabled = true
api_key = ""                        # DeepSeek API Key, or leave empty to auto-detect from env DEEPSEEK_API_KEY

[mimo]
enabled = false
api_key = ""                        # Xiaomi MiMo platform API Key
service_token = ""                  # Optional serviceToken cookie value; env: MIMO_SERVICE_TOKEN
cookie_header = ""                  # Optional full Cookie header; env: MIMO_COOKIE_HEADER

[openrouter]
enabled = false
api_key = ""                        # OpenRouter API Key; env: OPENROUTER_API_KEY
base_url = ""                       # Optional override, default: https://openrouter.ai/api/v1

[openai]
enabled = false
api_key = ""                        # OpenAI Admin/API Key; env: OPENAI_ADMIN_KEY / OPENAI_API_KEY
base_url = ""                       # Optional override, default: https://api.openai.com

[moonshot]
enabled = false
api_key = ""                        # Moonshot/Kimi API Key; env: MOONSHOT_API_KEY / KIMI_API_KEY
base_url = ""                       # Optional override, default: https://api.moonshot.cn/v1

[elevenlabs]
enabled = false
api_key = ""                        # ElevenLabs API Key; env: ELEVENLABS_API_KEY / XI_API_KEY
base_url = ""                       # Optional override, default: https://api.elevenlabs.io/v1

[doubao]
enabled = false
api_key = ""                        # Volcengine Ark API Key; env: ARK_API_KEY / VOLCENGINE_API_KEY / DOUBAO_API_KEY
base_url = ""                       # Optional override, default: https://ark.cn-beijing.volces.com/api/coding/v3/chat/completions

[zai]
enabled = false
api_key = ""                        # z.ai API Key; env: Z_AI_API_KEY / ZAI_API_KEY
base_url = ""                       # Optional full quota URL; env: Z_AI_QUOTA_URL or Z_AI_API_HOST

[venice]
enabled = false
