[general]
refresh_interval = 300
active_provider = ""                # Optional primary provider for tray icon/tip, e.g. "codex", "opencode", "claude"

[deepseek]
enabled = true
api_key = ""                        # DeepSeek API Key, or leave empty to auto-detect from env DEEPSEEK_API_KEY

[claude]
enabled = true
# auth_file = ""                    # Path to .credentials.json, auto-detected by default

[codex]
enabled = true
# auth_file = ""                    # Path to codex auth.json, auto-detected by default

[gemini]
enabled = true
api_key = ""                        # Gemini API Key, or leave empty to auto-detect from env GEMINI_API_KEY / GOOGLE_API_KEY

[opencode]
enabled = true
api_key = ""                        # Reserved; Go usage is read from opencode.ai browser auth cookie
workspace_id = ""                   # Optional wrk_... ID or opencode.ai workspace URL; env: OPENCODE_WORKSPACE_ID / CODEXBAR_OPENCODEGO_WORKSPACE_ID
auth_cookie = ""                    # Optional auth cookie value or full Cookie header; env: OPENCODE_AUTH_COOKIE

[mimo]
enabled = false
api_key = ""                        # Xiaomi MiMo platform API Key
